<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>부천평안교회 청년부 야외나들이 사진첩</title>
  <style>
    :root {
      --green:#5f9f63; --green-dark:#2f6841; --mint:#eaf7dc; --cream:#fffaf0;
      --yellow:#ffe8a9; --paper:#ffffff; --text:#243124; --muted:#6d7a69;
      --line:rgba(72,133,79,.22); --shadow:0 16px 42px rgba(54,89,44,.13);
      --radius:26px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:linear-gradient(180deg,#f3ffe9 0%,#fffaf0 48%,#fbfff3 100%);color:var(--text)}
    body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(rgba(72,133,79,.09) 1px,transparent 1px);background-size:22px 22px;mask-image:linear-gradient(180deg,rgba(0,0,0,.55),transparent 72%);}
    .hero{position:relative;overflow:hidden;padding:72px 20px 34px;text-align:center}
    .hero:before{content:"";position:absolute;inset:-130px -80px auto -80px;height:360px;background:radial-gradient(circle at 20% 36%,rgba(255,214,176,.78),transparent 27%),radial-gradient(circle at 80% 20%,rgba(255,232,169,.92),transparent 25%),radial-gradient(circle at 50% 90%,rgba(137,199,133,.5),transparent 37%);z-index:-1}
    .badge{display:inline-flex;gap:8px;align-items:center;padding:8px 14px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.78);color:var(--green-dark);font-size:14px;font-weight:900;box-shadow:0 8px 22px rgba(55,96,50,.08)}
    h1{margin:18px 0 0;font-size:clamp(33px,6vw,60px);line-height:1.06;letter-spacing:-.06em}
    .subtitle{max-width:780px;margin:18px auto 0;color:var(--muted);font-size:17px;line-height:1.75;word-break:keep-all}
    .hero-actions{margin-top:25px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
    a.btn,button{border:0;border-radius:999px;padding:12px 17px;font-family:inherit;font-weight:900;text-decoration:none;cursor:pointer;transition:.18s ease}
    .primary{background:var(--green-dark);color:white;box-shadow:0 12px 24px rgba(47,104,65,.23)}
    .soft,button{background:white;color:var(--green-dark);border:1px solid var(--line)}
    a.btn:hover,button:hover{transform:translateY(-1px)}
    main{max-width:1180px;margin:0 auto;padding:8px 16px 72px;position:relative}
    .toolbar{position:sticky;top:10px;z-index:20;margin:8px 0 22px;padding:13px;background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(10px);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .search{min-width:230px;flex:1;border:1px solid var(--line);border-radius:999px;padding:12px 15px;font-family:inherit;outline:none;background:#fff}
    .filters{display:flex;gap:8px;flex-wrap:wrap}
    button.active{background:var(--green);color:white;border-color:var(--green)}
    .stats{color:var(--muted);font-size:14px;font-weight:900;margin-left:auto}
    .status{display:none;margin:0 0 18px;padding:14px 16px;border-radius:18px;background:#fff8df;border:1px solid #f3df9f;color:#6b5b31;font-size:14px;line-height:1.55;word-break:keep-all}
    .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px}
    .photo-card{background:var(--paper);border:1px solid var(--line);border-radius:24px;overflow:hidden;box-shadow:0 12px 28px rgba(55,83,45,.10);transition:.2s ease}
    .photo-card:hover{transform:translateY(-3px);box-shadow:0 18px 36px rgba(55,83,45,.16)}
    .thumb{width:100%;aspect-ratio:1/1;background:linear-gradient(135deg,#e7f6d8,#fff0c0);overflow:hidden;cursor:zoom-in;position:relative}
    .thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:.25s ease}
    .photo-card:hover .thumb img{transform:scale(1.04)}
    .fallback{position:absolute;inset:0;display:none;align-items:center;justify-content:center;padding:16px;text-align:center;color:var(--green-dark);font-weight:900;font-size:13px;line-height:1.5}
    .fallback.show{display:flex}
    .meta{padding:12px 13px 14px}
    .name{font-weight:900;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sub{margin-top:5px;color:var(--muted);font-size:12px}
    .modal{position:fixed;inset:0;z-index:100;background:rgba(26,38,23,.84);display:none;align-items:center;justify-content:center;padding:18px}
    .modal.open{display:flex}
    .modal-box{width:min(1080px,100%);max-height:94vh;display:grid;grid-template-rows:auto 1fr auto;background:white;border-radius:28px;overflow:hidden;box-shadow:0 28px 80px rgba(0,0,0,.34)}
    .modal-top,.modal-bottom{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid var(--line)}
    .modal-bottom{border-top:1px solid var(--line);border-bottom:0;flex-wrap:wrap}
    .modal-title{min-width:0;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .viewer{position:relative;background:#162114;display:flex;align-items:center;justify-content:center;min-height:320px;overflow:auto}
    .viewer img{max-width:100%;max-height:72vh;display:block}
    .nav-btn{position:absolute;top:50%;transform:translateY(-50%);z-index:2;width:48px;height:48px;border-radius:999px;background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.55);color:var(--green-dark);box-shadow:0 10px 28px rgba(0,0,0,.24);font-size:24px;line-height:1;padding:0}
    .nav-btn.prev{left:14px}
    .nav-btn.next{right:14px}
    .privacy{margin-top:30px;padding:17px 19px;border-radius:22px;background:#fff8df;border:1px solid #f3df9f;color:#6b5b31;line-height:1.65;font-size:14px;word-break:keep-all}
    @media(max-width:820px){.toolbar{position:static}.search{min-width:100%}.stats{width:100%;margin-left:0}.gallery{grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:10px}.hero{padding-top:48px}.nav-btn{width:42px;height:42px;font-size:21px}.nav-btn.prev{left:8px}.nav-btn.next{right:8px}}
  </style>
</head>
<body>
  <section class="hero">
    <div class="badge">🌿 부천평안교회 청년부</div>
    <h1>야외나들이<br />피크닉 사진첩</h1>
    <p class="subtitle">일회용 필름카메라에 담긴 청년부의 야외나들이 순간들을 한곳에 모았습니다. 사진을 누르면 크게 볼 수 있고, 원본 전체 파일은 구글드라이브에서 받을 수 있습니다.</p>
    <div class="hero-actions">
      <a class="btn primary" href="https://drive.google.com/drive/folders/1VQqchFVZ9QfEtkcYfolYHWuGaEYpEsC1?usp=sharing" target="_blank" rel="noopener">원본 사진 전체 다운로드</a>
      <a class="btn soft" href="#gallery">사진첩 보기</a>
    </div>
  </section>
  <main>
    <div id="status" class="status"></div>
    <section class="toolbar">
      <input id="search" class="search" type="search" placeholder="사진 번호·원본 파일명 검색" />
      <div id="filters" class="filters"></div>
      <div id="stats" class="stats">사진 목록 준비 중...</div>
    </section>
    <section id="gallery" class="gallery"></section>
    <div class="privacy"><b>사진 공유 안내</b><br>이 사진첩은 부천평안교회 청년부 내부 공유용입니다. 개인 SNS에 사진을 올릴 때에는 사진에 함께 나온 사람의 동의를 먼저 확인해 주세요.</div>
  </main>
  <div id="modal" class="modal">
    <div class="modal-box">
      <div class="modal-top"><div id="modalTitle" class="modal-title">사진 보기</div><button id="closeModal">닫기</button></div>
      <div class="viewer">
        <button id="prevPhoto" class="nav-btn prev" aria-label="이전 사진">‹</button>
        <img id="modalImg" alt="확대 사진">
        <button id="nextPhoto" class="nav-btn next" aria-label="다음 사진">›</button>
      </div>
      <div class="modal-bottom"><span id="modalCount" class="stats"></span><a class="btn primary" href="https://drive.google.com/drive/folders/1VQqchFVZ9QfEtkcYfolYHWuGaEYpEsC1?usp=sharing" target="_blank" rel="noopener">원본 전체 다운로드</a></div>
    </div>
  </div>

let ITEMS = EMBEDDED_ITEMS;
let currentFilter = 'all';
let currentList = [];
let currentIndex = 0;

const $ = (id) => document.getElementById(id);
const gallery = $('gallery'), filters = $('filters'), stats = $('stats'), search = $('search'), statusBox = $('status');
const modal = $('modal'), modalImg = $('modalImg'), modalTitle = $('modalTitle'), modalCount = $('modalCount');

function showStatus(msg) { statusBox.style.display = 'block'; statusBox.innerHTML = msg; }
function hideStatus() { statusBox.style.display = 'none'; }
function pad(n) { return String(n).padStart(3,'0'); }
function cleanPath(p) {
  if (!p) return '';
  p = String(p).trim();
  if (!p) return '';
  if (p.startsWith('http://') || p.startsWith('https://') || p.startsWith('data:')) return p;
  return p.replace(/^\.\//,'').replace(/^\//,'');
}
function baseName(p) { return cleanPath(p).split('/').pop(); }
function unique(arr) { return [...new Set(arr.filter(Boolean))]; }
function withExtensions(name) {
  const b = baseName(name || '');
  if (!b) return [];
  const stem = b.replace(/\.(jpg|jpeg|png|webp)$/i,'');
  return ['jpg','JPG','jpeg','JPEG','png','PNG','webp','WEBP'].map(e => stem + '.' + e);
}
function addPathVariants(list, filename, folders) {
  if (!filename) return;
  const bn = baseName(filename);
  list.push(cleanPath(filename), bn);
  withExtensions(bn).forEach(v => {
    list.push(v);
    folders.forEach(dir => list.push(dir + v));
  });
}
function candidates(item, type='thumb') {
  const id = Number(item.id || item.no || item.number || 0);
  const n = id ? pad(id) : '';
  const list = [];
  if (type === 'thumb') {
    if (n) addPathVariants(list, `thumb_${n}.jpg`, ['', 'thumbs/', 'thumbnail/', 'thumbnails/', 'images/', 'assets/']);
    [item.thumb, item.thumbnail, item.preview, item.file, item.photo, item.src].forEach(v => addPathVariants(list, v, ['', 'thumbs/', 'photos/', 'images/', 'assets/']));
    if (n) addPathVariants(list, `photo_${n}.jpg`, ['', 'photos/', 'images/', 'assets/']);
  } else {
    [item.file, item.photo, item.src, item.image, item.thumb].forEach(v => addPathVariants(list, v, ['', 'photos/', 'images/', 'assets/', 'thumbs/']));
    if (n) addPathVariants(list, `photo_${n}.jpg`, ['', 'photos/', 'images/', 'assets/']);
  }
  return unique(list.map(cleanPath));
}
function loadWithFallback(img, list, onFail) {
  let i = 0;
  img.onerror = () => {
    i++;
    if (i < list.length) img.src = encodeURI(list[i]);
    else if (onFail) onFail();
  };
  img.onload = () => { img.style.display = 'block'; };
  img.style.display = 'block';
  img.src = encodeURI(list[0] || '');
}
function itemTitle(item) {
  const original = baseName(item.original || '');
  if (original) return original;
  const id = Number(item.id || item.no || item.number || 0);
  const name = baseName(item.file || item.photo || item.src || item.thumb || '');
  return name || (id ? `photo_${pad(id)}.jpg` : '사진');
}
function filmValue(item) { return item.film || item.group || item.category || 'all'; }
function filmLabel(item) { return item.filmLabel || item.groupLabel || item.categoryLabel || filmValue(item); }

function init() {
  if (!Array.isArray(ITEMS) || !ITEMS.length) {
    ITEMS = Array.from({length:180}, (_,i)=>({id:i+1,file:`photo_${pad(i+1)}.jpg`,thumb:`photo_${pad(i+1)}.jpg`,film:'all',filmLabel:'전체'}));
    showStatus('사진 목록을 읽지 못해 기본 파일명으로 불러오고 있습니다.');
  } else {
    hideStatus();
  }
  ITEMS = ITEMS.map((it, idx) => ({ id: it.id || it.no || it.number || idx + 1, ...it }));
  buildFilters();
  render();
}
function buildFilters() {
  const order = ['winter','film1','film2','film3','film4','film5'];
  const map = new Map();
  ITEMS.forEach(it => map.set(filmValue(it), filmLabel(it)));
  const ordered = order.filter(v => map.has(v)).map(v => [v,map.get(v)]);
  const rest = Array.from(map.entries()).filter(([v]) => v !== 'all' && !order.includes(v));
  const entries = [['all','전체'], ...ordered, ...rest];
  filters.innerHTML = entries.map(([v,l]) => `<button data-filter="${v}" class="${v==='all'?'active':''}">${l}</button>`).join('');
  filters.querySelectorAll('button').forEach(btn => btn.onclick = () => {
    currentFilter = btn.dataset.filter;
    filters.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
}
function render() {
  const q = search.value.trim().toLowerCase();
  currentList = ITEMS.filter(it => currentFilter === 'all' || filmValue(it) === currentFilter)
    .filter(it => !q || JSON.stringify(it).toLowerCase().includes(q) || itemTitle(it).toLowerCase().includes(q))
    .sort((a,b)=>Number(a.id)-Number(b.id));
  stats.textContent = `전체 ${ITEMS.length}장 중 ${currentList.length}장 표시`;
  gallery.innerHTML = '';
  currentList.forEach((it, idx) => {
    const card = document.createElement('article'); card.className = 'photo-card';
    const title = itemTitle(it);
    card.innerHTML = `<div class="thumb"><div class="fallback">이미지를 불러오지 못했습니다</div></div><div class="meta"><div class="name" title="${title}">${title}</div><div class="sub">${filmLabel(it)}</div></div>`;
    const img = document.createElement('img'); img.alt = title; img.loading = 'lazy';
    card.querySelector('.thumb').prepend(img);
    const fallback = card.querySelector('.fallback');
    loadWithFallback(img, candidates(it,'thumb'), () => { img.style.display='none'; fallback.classList.add('show'); });
    card.querySelector('.thumb').onclick = () => openModal(idx);
    gallery.appendChild(card);
  });
}
function openModal(idx) {
  if (!currentList.length) return;
  currentIndex = (idx + currentList.length) % currentList.length;
  const it = currentList[currentIndex];
  modal.classList.add('open');
  modalTitle.textContent = itemTitle(it);
  modalCount.textContent = `${currentIndex+1} / ${currentList.length}`;
  modalImg.style.display='block';
  loadWithFallback(modalImg, candidates(it,'photo'), () => {
    modalImg.style.display='none';
    modalTitle.textContent = itemTitle(it) + ' · 이미지를 불러오지 못했습니다';
  });
}
function closeModal() { modal.classList.remove('open'); modalImg.src=''; }
function movePhoto(delta) { if (modal.classList.contains('open')) openModal(currentIndex + delta); }
$('closeModal').onclick = closeModal;
$('prevPhoto').onclick = (e) => { e.stopPropagation(); movePhoto(-1); };
$('nextPhoto').onclick = (e) => { e.stopPropagation(); movePhoto(1); };
modal.onclick = e => { if (e.target === modal) closeModal(); };
document.addEventListener('keydown', e => {
  if(e.key==='Escape') closeModal();
  if(e.key==='ArrowLeft') movePhoto(-1);
  if(e.key==='ArrowRight') movePhoto(1);
});
search.addEventListener('input', render);
init();
</script>
